<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 960" role="img" aria-labelledby="title desc">
  <title id="title">Stylized 3D pineapple</title>
  <desc id="desc">A pineapple SVG with layered gradients and shading for a dimensional look during rotation.</desc>
  <defs>
    <linearGradient id="leafFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7df47b"/>
      <stop offset="42%" stop-color="#1fa85d"/>
      <stop offset="100%" stop-color="#075b34"/>
    </linearGradient>
    <linearGradient id="leafBack" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#55cf66"/>
      <stop offset="100%" stop-color="#063d28"/>
    </linearGradient>
    <linearGradient id="bodyFill" x1="0.15" y1="0.1" x2="0.9" y2="0.95">
      <stop offset="0%" stop-color="#ffe36f"/>
      <stop offset="0.28" stop-color="#ffc928"/>
      <stop offset="0.68" stop-color="#d89019"/>
      <stop offset="1" stop-color="#7b3f06"/>
    </linearGradient>
    <radialGradient id="bodyGlow" cx="0.42" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#fff3af" stop-opacity="0.9"/>
      <stop offset="0.3" stop-color="#ffd54f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd54f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sideShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="0.18" stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.82" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="rimLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="0.22" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.78" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="6"/>
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="-1" k3="1"/>
    </filter>
    <clipPath id="bodyClip">
      <path d="M320 452c76 0 148 46 170 142c19 82 18 222-42 279c-31 30-72 45-128 45s-97-15-128-45c-60-57-61-197-42-279c22-96 94-142 170-142z"/>
    </clipPath>
    <path id="leafTall" d="M0 0C28-86 67-174 112-254C106-188 92-124 86-48C110-92 145-136 188-181C165-125 136-77 116-25C144-54 183-81 232-107C194-56 153-20 126 20C95 14 55 8 0 0z"/>
    <path id="leafWide" d="M0 0C26-50 64-103 118-148C110-103 102-62 98-20C123-48 154-77 198-108C177-71 155-40 142-6C171-27 205-42 242-54C196-22 161 4 130 28C91 18 49 10 0 0z"/>
  </defs>

  <g id="pineapple" filter="url(#softShadow)" stroke="#0f0b06" stroke-linejoin="round" stroke-linecap="round">
    <g id="crown" transform="translate(320 120)">
      <g fill="url(#leafBack)" stroke-width="8">
        <use href="#leafTall" transform="translate(-6 184) rotate(-56) scale(0.84 1.02)"/>
        <use href="#leafTall" transform="translate(18 158) rotate(-35) scale(0.88 1.06)"/>
        <use href="#leafTall" transform="translate(72 120) rotate(-18) scale(0.82 1.02)"/>
        <use href="#leafTall" transform="translate(74 216) rotate(46) scale(-0.78 0.96)"/>
        <use href="#leafTall" transform="translate(40 182) rotate(28) scale(-0.86 1.04)"/>
        <use href="#leafTall" transform="translate(-18 146) rotate(12) scale(-0.9 1.08)"/>
        <use href="#leafWide" transform="translate(-106 252) rotate(-48) scale(0.94 1.06)"/>
        <use href="#leafWide" transform="translate(106 252) rotate(46) scale(-0.94 1.06)"/>
      </g>
      <g fill="url(#leafFront)" stroke-width="9">
        <use href="#leafTall" transform="translate(0 126) rotate(0) scale(0.96 1.18)"/>
        <use href="#leafTall" transform="translate(-38 168) rotate(-22) scale(0.92 1.04)"/>
        <use href="#leafTall" transform="translate(38 168) rotate(22) scale(-0.92 1.04)"/>
        <use href="#leafWide" transform="translate(-80 234) rotate(-24) scale(1 1.06)"/>
        <use href="#leafWide" transform="translate(80 234) rotate(24) scale(-1 1.06)"/>
        <use href="#leafWide" transform="translate(-18 278) rotate(-6) scale(0.9 0.92)"/>
        <use href="#leafWide" transform="translate(18 278) rotate(6) scale(-0.9 0.92)"/>
      </g>
      <path d="M-82 320c54-12 110-12 164 0v22c-53-9-108-9-164 0z" fill="#0b6a41" stroke-width="9"/>
    </g>

    <g id="body">
      <path d="M320 452c76 0 148 46 170 142c19 82 18 222-42 279c-31 30-72 45-128 45s-97-15-128-45c-60-57-61-197-42-279c22-96 94-142 170-142z" fill="url(#bodyFill)" stroke-width="10"/>
      <path d="M320 470c66 0 128 38 148 118c18 74 17 201-34 252c-27 27-64 40-114 40s-87-13-114-40c-51-51-52-178-34-252c20-80 82-118 148-118z" fill="url(#bodyGlow)" stroke="none"/>
      <g clip-path="url(#bodyClip)" stroke="#120d08" stroke-width="6">
        <g opacity="0.95">
          <path d="M90 900L440 450"/>
          <path d="M120 924L470 474"/>
          <path d="M150 940L500 490"/>
          <path d="M180 948L530 498"/>
          <path d="M210 952L560 502"/>
          <path d="M240 954L590 504"/>
          <path d="M550 900L200 450"/>
          <path d="M520 924L170 474"/>
          <path d="M490 940L140 490"/>
          <path d="M460 948L110 498"/>
          <path d="M430 952L80 502"/>
          <path d="M400 954L50 504"/>
        </g>
        <g opacity="0.36" stroke="#fff4c7" stroke-width="3">
          <path d="M113 872L428 468"/>
          <path d="M193 905L508 501"/>
          <path d="M527 872L212 468"/>
          <path d="M447 905L132 501"/>
        </g>
        <g opacity="0.2" stroke="#2d1503" stroke-width="2">
          <path d="M136 580H504"/>
          <path d="M120 678H520"/>
          <path d="M132 776H508"/>
          <path d="M174 862H466"/>
        </g>
      </g>
      <path d="M320 452c76 0 148 46 170 142c19 82 18 222-42 279c-31 30-72 45-128 45s-97-15-128-45c-60-57-61-197-42-279c22-96 94-142 170-142z" fill="url(#sideShade)" stroke="none"/>
      <path d="M320 452c76 0 148 46 170 142c19 82 18 222-42 279c-31 30-72 45-128 45s-97-15-128-45c-60-57-61-197-42-279c22-96 94-142 170-142z" fill="url(#rimLight)" stroke="none" opacity="0.6"/>
      <path d="M245 512c34-26 81-40 128-38" fill="none" stroke="#fff8d5" stroke-opacity="0.7" stroke-width="12"/>
      <ellipse cx="320" cy="892" rx="98" ry="24" fill="#000000" opacity="0.14" stroke="none"/>
      <path d="M320 452c76 0 148 46 170 142c19 82 18 222-42 279c-31 30-72 45-128 45s-97-15-128-45c-60-57-61-197-42-279c22-96 94-142 170-142z" fill="none" stroke="#0f0b06" stroke-width="10" filter="url(#innerShadow)"/>
    </g>
  </g>
</svg>
